<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cromato Buddy - RAG com JSON</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, sans-serif;
            background: #f0f4f9;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .app {
            max-width: 1000px;
            width: 100%;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 800px;
            border: 1px solid #e9edf4;
        }
        .header {
            padding: 18px 28px;
            background: white;
            border-bottom: 1px solid #f0f3f8;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .header h1 { font-size: 1.3rem; color: #0b1a33; }
        .badge {
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.7rem;
            background: #eef3fc;
            color: #1f4a8a;
        }
        .badge.success { background: #e6f7ed; color: #0f6e3f; }
        .badge.error { background: #fde8e8; color: #a93226; }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 28px;
            background: #fafcff;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .message {
            max-width: 85%;
            padding: 12px 18px;
            border-radius: 18px;
            line-height: 1.5;
            font-size: 0.95rem;
            word-break: break-word;
            animation: fadeIn 0.25s ease;
        }
        .message.user {
            align-self: flex-end;
            background: #dce6f9;
            color: #0b1f3f;
            border-bottom-right-radius: 6px;
        }
        .message.bot {
            align-self: flex-start;
            background: white;
            border: 1px solid #e2eaf5;
            color: #1e293b;
            border-bottom-left-radius: 6px;
        }
        .message.bot .meta {
            font-size: 0.65rem;
            color: #6b7f9c;
            margin-top: 8px;
            border-top: 1px solid #edf2f9;
            padding-top: 6px;
        }
        .typing {
            align-self: flex-start;
            background: white;
            padding: 12px 20px;
            border-radius: 24px;
            border: 1px solid #e2eaf5;
            color: #3e5a7a;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .input-area {
            padding: 16px 28px 24px;
            background: white;
            border-top: 1px solid #edf2f9;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        .input-area textarea {
            flex: 1;
            border: 1px solid #dce3ee;
            border-radius: 24px;
            padding: 12px 18px;
            font-size: 0.95rem;
            font-family: inherit;
            resize: none;
            outline: none;
            background: #f9fcff;
            min-height: 52px;
            max-height: 120px;
            line-height: 1.4;
        }
        .input-area textarea:focus {
            border-color: #2f6bb0;
            background: white;
        }
        .input-area button {
            background: #1a4b8c;
            border: none;
            color: white;
            font-weight: 500;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 0.95rem;
            cursor: pointer;
            height: 52px;
            box-shadow: 0 4px 8px rgba(26, 75, 140, 0.15);
        }
        .input-area button:hover:not(:disabled) {
            background: #0f3d72;
        }
        .input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .info-bar {
            padding: 6px 28px 16px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            font-size: 0.75rem;
            color: #6b7f9c;
            border-top: 1px solid #f0f3f8;
        }
        @keyframes fadeIn {
            from { opacity: 0.4; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .loader {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #cbd8ec;
            border-top-color: #1a4b8c;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <h1>🧪 Cromato Buddy</h1>
            <div>
                <span class="badge" id="statusBadge">⏳ carregando...</span>
                <span class="badge" id="modelBadge">⏳ modelo...</span>
            </div>
        </div>
        <div class="chat-container" id="chatContainer">
            <div class="message bot">
                <strong>👋 Cromato Buddy</strong><br><br>
                📂 Carregando base de conhecimento do arquivo <code>knowledge-base.json</code>...<br>
                💬 Faça perguntas sobre cromatografia, LC-MS, SPME, grafeno e muito mais.
                <div class="meta">✅ RAG local · WebLLM · JSON pré-processado</div>
            </div>
        </div>
        <div class="input-area">
            <textarea id="userInput" rows="1" placeholder="Pergunte sobre cromatografia..." disabled></textarea>
            <button id="sendBtn" disabled>Enviar</button>
        </div>
        <div class="info-bar">
            <span id="chunkInfo">📚 0 chunks</span>
            <span id="versionInfo">📌 versão: -</span>
            <span id="sourceInfo">📄 origem: -</span>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "@xenova/transformers": "https://cdn.jsdelivr.net/npm/@xenova/transformers@2.9.0/dist/transformers.js"
            }
        }
    </script>

    <script type="module">
        import { pipeline } from '@xenova/transformers';

        // ==================== ESTADO ====================
        let knowledgeData = null;
        let embedder = null;
        let modelReady = false;
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        // ==================== CARREGA JSON ====================
        async function loadKnowledgeBase() {
            const statusBadge = document.getElementById('statusBadge');
            
            try {
                statusBadge.textContent = '⏳ carregando JSON...';
                const response = await fetch('knowledge-base.json');
                
                if (!response.ok) {
                    throw new Error('knowledge-base.json não encontrado');
                }
                
                knowledgeData = await response.json();
                
                const chunks = knowledgeData.chunks || [];
                statusBadge.textContent = `✅ ${chunks.length} chunks`;
                statusBadge.className = 'badge success';
                
                document.getElementById('chunkInfo').textContent = `📚 ${chunks.length} chunks`;
                document.getElementById('versionInfo').textContent = `📌 versão: ${knowledgeData.versao || '-'}`;
                document.getElementById('sourceInfo').textContent = `📄 ${knowledgeData.arquivos_origem?.join(', ') || '-'}`;
                
                userInput.disabled = false;
                sendBtn.disabled = false;
                
                addMessage('bot', `✅ **Base carregada com sucesso!**\n\n📚 ${chunks.length} chunks\n📌 Versão: ${knowledgeData.versao || '-'}\n📄 Fontes: ${knowledgeData.arquivos_origem?.join(', ') || '-'}\n\nAgora você pode fazer perguntas.`);
                
                return chunks;
                
            } catch (err) {
                console.warn('Erro ao carregar knowledge-base.json:', err);
                statusBadge.textContent = '⚠️ JSON não encontrado';
                statusBadge.className = 'badge error';
                
                addMessage('bot', `⚠️ **Arquivo JSON não encontrado.**\n\nExecute o script Python para gerar o arquivo \`knowledge-base.json\` a partir dos seus .docx.\n\n\`\`\`bash\npython processor.py\n\`\`\``);
                return [];
            }
        }

        // ==================== EMBEDDING ====================
        async function initEmbedder() {
            try {
                document.getElementById('modelBadge').textContent = '⏳ carregando...';
                embedder = await pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2');
                modelReady = true;
                document.getElementById('modelBadge').textContent = '✅ modelo pronto';
            } catch (err) {
                console.warn('Erro no modelo, usando fallback:', err);
                document.getElementById('modelBadge').textContent = '⚠️ fallback: palavras';
                modelReady = false;
            }
        }

        // ==================== RAG ====================
        function cosineSimilarity(vecA, vecB) {
            if (!vecA || !vecB || vecA.length !== vecB.length) return 0;
            let dot = 0, normA = 0, normB = 0;
            for (let i = 0; i < vecA.length; i++) {
                dot += vecA[i] * vecB[i];
                normA += vecA[i] * vecA[i];
                normB += vecB[i] * vecB[i];
            }
            if (normA === 0 || normB === 0) return 0;
            return dot / (Math.sqrt(normA) * Math.sqrt(normB));
        }

        async function retrieveChunks(query, topK = 5) {
            if (!knowledgeData || !knowledgeData.chunks || knowledgeData.chunks.length === 0) {
                return [];
            }

            const allChunks = knowledgeData.chunks;

            if (!modelReady || !embedder) {
                // Fallback rápido: busca por palavras-chave
                const tokens = query.toLowerCase().split(/\s+/).filter(w => w.length > 3);
                const scored = allChunks.map(chunk => {
                    const text = `${chunk.conteudo} ${chunk.palavras_chave?.join(' ') || ''}`.toLowerCase();
                    let score = 0;
                    for (const token of tokens) {
                        if (text.includes(token)) score += 1;
                    }
                    return { ...chunk, score };
                });
                scored.sort((a, b) => b.score - a.score);
                return scored.slice(0, topK);
            }

            // Embedding da query
            const queryEmbed = await embedder(query, { pooling: 'mean', normalize: true });
            const queryVec = queryEmbed.data;

            const chunksWithScore = [];
            
            // Processa em lotes para não travar
            const batchSize = 20;
            for (let i = 0; i < allChunks.length; i += batchSize) {
                const batch = allChunks.slice(i, i + batchSize);
                for (const chunk of batch) {
                    if (!chunk._embed) {
                        const text = `${chunk.conteudo} ${chunk.palavras_chave?.join(' ') || ''}`;
                        try {
                            const emb = await embedder(text, { pooling: 'mean', normalize: true });
                            chunk._embed = emb.data;
                        } catch (e) {
                            // fallback para este chunk
                            chunk._embed = null;
                        }
                    }
                    if (chunk._embed) {
                        const sim = cosineSimilarity(queryVec, chunk._embed);
                        chunksWithScore.push({ ...chunk, similarity: sim });
                    }
                }
                // Permite UI responder entre lotes
                await new Promise(r => setTimeout(r, 0));
            }

            chunksWithScore.sort((a, b) => b.similarity - a.similarity);
            return chunksWithScore.slice(0, topK);
        }

        // ==================== UI ====================
        function addMessage(sender, content) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.innerHTML = content.replace(/\n/g, '<br>');
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'typing';
            div.id = 'typingIndicator';
            div.innerHTML = '⏳ processando RAG...';
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeTyping() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        async function handleUserQuery() {
            if (sendBtn.disabled) return;
            const query = userInput.value.trim();
            if (!query) return;

            sendBtn.disabled = true;
            userInput.disabled = true;
            addMessage('user', `<strong>${query}</strong>`);
            userInput.value = '';
            showTyping();

            try {
                const chunks = await retrieveChunks(query, 5);
                removeTyping();

                if (!chunks || chunks.length === 0) {
                    addMessage('bot', '❌ Nenhum chunk encontrado. Verifique se o JSON foi carregado.');
                    return;
                }

                let response = `🔍 <strong>Pergunta:</strong> ${query}<br><br>`;
                response += `📘 <strong>Chunks mais relevantes (${chunks.length}):</strong><br><br>`;
                for (let i = 0; i < chunks.length; i++) {
                    const c = chunks[i];
                    response += `<strong>${i+1}.</strong> ${c.conteudo.substring(0, 400)}${c.conteudo.length > 400 ? '...' : ''}<br>`;
                    response += `<span style="font-size:0.75rem; color:#6b7f9c;">📄 ${c.fonte || 'knowledge-base'} | Palavras: ${c.palavras_chave?.join(', ') || '-'}</span><br><br>`;
                }
                response += `💡 <em>Resposta gerada com RAG local (WebLLM + JSON pré-processado).</em>`;
                addMessage('bot', response);

            } catch (err) {
                removeTyping();
                console.error(err);
                addMessage('bot', `❌ Erro: ${err.message || 'tente novamente'}`);
            } finally {
                sendBtn.disabled = false;
                userInput.disabled = false;
                userInput.focus();
            }
        }

        // ==================== EVENTOS ====================
        sendBtn.addEventListener('click', handleUserQuery);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleUserQuery();
            }
        });

        userInput.addEventListener('input', () => {
            userInput.style.height = 'auto';
            userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
        });

        // ==================== INICIALIZAÇÃO ====================
        async function init() {
            await initEmbedder();
            await loadKnowledgeBase();
        }

        init();
    </script>
</body>
</html>
