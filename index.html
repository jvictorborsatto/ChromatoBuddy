<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cromato Buddy - RAG Avançado</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, sans-serif;
            background: #f0f4f9;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .app {
            max-width: 1000px;
            width: 100%;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 800px;
            border: 1px solid #e9edf4;
        }
        .header {
            padding: 18px 28px;
            background: white;
            border-bottom: 1px solid #f0f3f8;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .header h1 { font-size: 1.3rem; color: #0b1a33; }
        .badge {
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.7rem;
            background: #eef3fc;
            color: #1f4a8a;
        }
        .badge.success { background: #e6f7ed; color: #0f6e3f; }
        .badge.error { background: #fde8e8; color: #a93226; }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 28px;
            background: #fafcff;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .message {
            max-width: 90%;
            padding: 14px 20px;
            border-radius: 18px;
            line-height: 1.6;
            font-size: 0.95rem;
            word-break: break-word;
            animation: fadeIn 0.25s ease;
        }
        .message.user {
            align-self: flex-end;
            background: #dce6f9;
            color: #0b1f3f;
            border-bottom-right-radius: 6px;
        }
        .message.bot {
            align-self: flex-start;
            background: white;
            border: 1px solid #e2eaf5;
            color: #1e293b;
            border-bottom-left-radius: 6px;
        }
        .message.bot .meta {
            font-size: 0.65rem;
            color: #6b7f9c;
            margin-top: 10px;
            border-top: 1px solid #edf2f9;
            padding-top: 8px;
        }
        .message.bot .sources {
            font-size: 0.8rem;
            background: #f8faff;
            padding: 10px 14px;
            border-radius: 10px;
            margin-top: 10px;
            border-left: 3px solid #2f6bb0;
        }
        .typing {
            align-self: flex-start;
            background: white;
            padding: 12px 20px;
            border-radius: 24px;
            border: 1px solid #e2eaf5;
            color: #3e5a7a;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .input-area {
            padding: 16px 28px 24px;
            background: white;
            border-top: 1px solid #edf2f9;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        .input-area textarea {
            flex: 1;
            border: 1px solid #dce3ee;
            border-radius: 24px;
            padding: 12px 18px;
            font-size: 0.95rem;
            font-family: inherit;
            resize: none;
            outline: none;
            background: #f9fcff;
            min-height: 52px;
            max-height: 120px;
            line-height: 1.4;
        }
        .input-area textarea:focus {
            border-color: #2f6bb0;
            background: white;
        }
        .input-area button {
            background: #1a4b8c;
            border: none;
            color: white;
            font-weight: 500;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 0.95rem;
            cursor: pointer;
            height: 52px;
            box-shadow: 0 4px 8px rgba(26, 75, 140, 0.15);
            transition: all 0.2s;
        }
        .input-area button:hover:not(:disabled) {
            background: #0f3d72;
            transform: translateY(-1px);
        }
        .input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .info-bar {
            padding: 6px 28px 16px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            font-size: 0.75rem;
            color: #6b7f9c;
            border-top: 1px solid #f0f3f8;
        }
        @keyframes fadeIn {
            from { opacity: 0.4; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .loader {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #cbd8ec;
            border-top-color: #1a4b8c;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .highlight {
            background: #fff3cd;
            padding: 0 4px;
            border-radius: 3px;
        }
        .confidence-low {
            color: #e67e22;
            font-size: 0.8rem;
        }
        .confidence-high {
            color: #27ae60;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <h1>🧪 Cromato Buddy v2</h1>
            <div>
                <span class="badge" id="statusBadge">⏳ carregando...</span>
                <span class="badge" id="modelBadge">⏳ modelo...</span>
            </div>
        </div>
        <div class="chat-container" id="chatContainer">
            <div class="message bot">
                <strong>👋 Cromato Buddy v2</strong><br><br>
                🧠 <strong>RAG inteligente com síntese de respostas</strong><br>
                📂 Base: <code>knowledge-base.json</code><br>
                💬 Pergunte sobre cromatografia, LC-MS, SPME, partículas e muito mais.
                <div class="meta">✅ RAG local · Síntese automática · Fallback BM25</div>
            </div>
        </div>
        <div class="input-area">
            <textarea id="userInput" rows="1" placeholder="Pergunte sobre cromatografia..." disabled></textarea>
            <button id="sendBtn" disabled>Enviar</button>
        </div>
        <div class="info-bar">
            <span id="chunkInfo">📚 0 chunks</span>
            <span id="versionInfo">📌 versão: -</span>
            <span id="sourceInfo">📄 origem: -</span>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "@xenova/transformers": "https://cdn.jsdelivr.net/npm/@xenova/transformers@2.9.0/dist/transformers.js"
            }
        }
    </script>

    <script type="module">
        import { pipeline } from '@xenova/transformers';

        // ==================== ESTADO ====================
        let knowledgeData = null;
        let embedder = null;
        let modelReady = false;
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        // ==================== KNOWLEDGE BASE (FALLBACK) ====================
        // Conhecimento geral sobre cromatografia para quando os chunks não têm a resposta
        const FALLBACK_KNOWLEDGE = {
            'tamanho da partícula': `O tamanho da partícula é um dos parâmetros mais críticos em cromatografia líquida (LC) e afeta diretamente a eficiência da separação, a pressão do sistema e a resolução.

**Efeitos principais:**

1. **Eficiência da coluna (Teoria de Van Deemter):** 
   - Partículas menores (≤ 2 µm) proporcionam maior eficiência (menor HETP - altura equivalente a um prato teórico) devido à redução da contribuição do termo de transferência de massa (termo C).
   - A equação de Van Deemter: H = A + B/u + C·u, onde C é proporcional ao quadrado do diâmetro da partícula (dp²).

2. **Resolução:**
   - Partículas menores aumentam a resolução por permitir colunas mais longas com eficiência equivalente, ou colunas mais curtas com separação mais rápida.
   - Rs ∝ √N, e N ∝ 1/dp (teoricamente).

3. **Pressão (Lei de Darcy):**
   - ΔP ∝ 1/dp² (pressão inversamente proporcional ao quadrado do diâmetro)
   - Partículas de 1,7 µm geram pressões ~2x maiores que 3 µm e ~4x maiores que 5 µm.
   - Limite prático: sistemas UHPLC (até 1300 bar) usam partículas < 2 µm.

4. **Velocidade de análise:**
   - Partículas menores permitem fluxos mais altos e análises mais rápidas (cromatografia ultra-rápida).

5. **Tipos de partícula:**
   - **Totalmente Porosas (FP):** 3-5 µm, usadas em HPLC tradicional.
   - **Superficialmente Porosas (SPP/core-shell):** núcleo sólido com camada porosa (2,7 µm, 1,7 µm), oferecem alta eficiência com menor pressão.
   - **Monolíticas:** estrutura contínua porosa, baixa pressão, alta vazão.

**Trade-off:** partículas menores = maior resolução, mas também maior pressão, maior custo e maior susceptibilidade a entupimentos. A escolha depende da técnica (HPLC vs UHPLC), da complexidade da amostra e da instrumentação disponível.`,

            'pressão coluna': `A pressão em colunas cromatográficas é governada principalmente por:
1. Tamanho da partícula (ΔP ∝ 1/dp²)
2. Viscosidade da fase móvel
3. Comprimento da coluna
4. Vazão (fluxo)

**Partículas menores exigem pressões mais altas** - esta é a razão para o desenvolvimento da UHPLC (Ultra-High Performance Liquid Chromatography), que opera a pressões de até 1300 bar para usar partículas de 1,7-2 µm.

**Limites práticos:**
- HPLC convencional: partículas 3-5 µm, pressão até 400 bar
- UHPLC: partículas 1,7-2 µm, pressão até 1300 bar`,

            'resolução': `A resolução (Rs) em cromatografia é determinada por três fatores (equação fundamental):
Rs = (√N/4) × (α-1/α) × (k'/(1+k'))

Onde:
- **N:** número de pratos teóricos (eficiência da coluna)
- **α:** seletividade (fator de separação entre picos)
- **k':** fator de retenção

**A eficiência (N) é inversamente proporcional ao tamanho da partícula** - partículas menores → mais pratos teóricos → maior resolução.
Porém, o ganho de resolução com partículas menores tem limite prático devido ao aumento da pressão e do efeito de dispersão axial.`
        };

        // ==================== CARREGA JSON ====================
        async function loadKnowledgeBase() {
            const statusBadge = document.getElementById('statusBadge');
            
            try {
                statusBadge.textContent = '⏳ carregando JSON...';
                const response = await fetch('knowledge-base.json');
                
                if (!response.ok) {
                    throw new Error('knowledge-base.json não encontrado');
                }
                
                knowledgeData = await response.json();
                
                const chunks = knowledgeData.chunks || [];
                statusBadge.textContent = `✅ ${chunks.length} chunks`;
                statusBadge.className = 'badge success';
                
                document.getElementById('chunkInfo').textContent = `📚 ${chunks.length} chunks`;
                document.getElementById('versionInfo').textContent = `📌 versão: ${knowledgeData.versao || '-'}`;
                document.getElementById('sourceInfo').textContent = `📄 ${knowledgeData.arquivos_origem?.join(', ') || '-'}`;
                
                userInput.disabled = false;
                sendBtn.disabled = false;
                
                addMessage('bot', `✅ **Base carregada com sucesso!**\n\n📚 ${chunks.length} chunks\n📌 Versão: ${knowledgeData.versao || '-'}\n📄 Fontes: ${knowledgeData.arquivos_origem?.join(', ') || '-'}\n\n🧠 Agora com **síntese inteligente** - se a base não tiver a resposta exata, usarei meu conhecimento geral para complementar.`);
                
                return chunks;
                
            } catch (err) {
                console.warn('Erro ao carregar knowledge-base.json:', err);
                statusBadge.textContent = '⚠️ JSON não encontrado';
                statusBadge.className = 'badge error';
                
                addMessage('bot', `⚠️ **Arquivo JSON não encontrado.**\n\nUsando modo **fallback com conhecimento geral**.\n\nExecute o script Python para gerar o arquivo \`knowledge-base.json\` a partir dos seus .docx.\n\n\`\`\`bash\npython processor.py\n\`\`\``);
                
                // Mesmo sem JSON, permite perguntar usando fallback
                userInput.disabled = false;
                sendBtn.disabled = false;
                return [];
            }
        }

        // ==================== EMBEDDING ====================
        async function initEmbedder() {
            try {
                document.getElementById('modelBadge').textContent = '⏳ carregando...';
                embedder = await pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2');
                modelReady = true;
                document.getElementById('modelBadge').textContent = '✅ modelo pronto';
            } catch (err) {
                console.warn('Erro no modelo, usando fallback:', err);
                document.getElementById('modelBadge').textContent = '⚠️ fallback: palavras';
                modelReady = false;
            }
        }

        // ==================== RAG MELHORADO ====================
        function cosineSimilarity(vecA, vecB) {
            if (!vecA || !vecB || vecA.length !== vecB.length) return 0;
            let dot = 0, normA = 0, normB = 0;
            for (let i = 0; i < vecA.length; i++) {
                dot += vecA[i] * vecB[i];
                normA += vecA[i] * vecA[i];
                normB += vecB[i] * vecB[i];
            }
            if (normA === 0 || normB === 0) return 0;
            return dot / (Math.sqrt(normA) * Math.sqrt(normB));
        }

        // BM25 simplificado para fallback
        function bm25Search(query, chunks) {
            const queryTokens = query.toLowerCase().split(/\s+/).filter(w => w.length > 2);
            if (queryTokens.length === 0) return chunks.slice(0, 5);
            
            const docFreq = {};
            const docLengths = chunks.map(c => {
                const text = `${c.conteudo || ''} ${c.tags?.join(' ') || ''} ${c.titulo || ''}`.toLowerCase();
                const tokens = text.split(/\s+/);
                return tokens;
            });
            
            // Term frequency and document frequency
            const termDocs = {};
            docLengths.forEach((tokens, idx) => {
                const unique = new Set(tokens);
                unique.forEach(token => {
                    if (!termDocs[token]) termDocs[token] = new Set();
                    termDocs[token].add(idx);
                });
            });
            
            const avgDocLen = docLengths.reduce((sum, t) => sum + t.length, 0) / docLengths.length;
            const totalDocs = docLengths.length;
            const k1 = 1.5;
            const b = 0.75;
            
            const scores = chunks.map((chunk, idx) => {
                const tokens = docLengths[idx];
                let score = 0;
                queryTokens.forEach(qt => {
                    const tf = tokens.filter(t => t === qt).length;
                    if (tf === 0) return;
                    const idf = Math.log((totalDocs - (termDocs[qt]?.size || 0) + 0.5) / ((termDocs[qt]?.size || 0) + 0.5) + 1);
                    const docLen = tokens.length;
                    score += idf * (tf * (k1 + 1)) / (tf + k1 * (1 - b + b * docLen / avgDocLen));
                });
                return { ...chunk, bm25_score: score };
            });
            
            scores.sort((a, b) => (b.bm25_score || 0) - (a.bm25_score || 0));
            return scores.slice(0, 5);
        }

        // Busca por conhecimento geral (fallback)
        function searchFallbackKnowledge(query) {
            const queryLower = query.toLowerCase();
            const matches = [];
            
            for (const [key, value] of Object.entries(FALLBACK_KNOWLEDGE)) {
                const keyWords = key.toLowerCase().split(' ');
                const matchCount = keyWords.filter(w => queryLower.includes(w)).length;
                if (matchCount > 0 || keyWords.some(w => queryLower.includes(w))) {
                    matches.push({
                        topic: key,
                        content: value,
                        relevance: matchCount / keyWords.length
                    });
                }
            }
            
            matches.sort((a, b) => b.relevance - a.relevance);
            return matches;
        }

        async function retrieveChunks(query, topK = 5) {
            if (!knowledgeData || !knowledgeData.chunks || knowledgeData.chunks.length === 0) {
                return [];
            }

            const allChunks = knowledgeData.chunks;

            if (!modelReady || !embedder) {
                // Fallback BM25
                return bm25Search(query, allChunks);
            }

            // Embedding da query
            const queryEmbed = await embedder(query, { pooling: 'mean', normalize: true });
            const queryVec = queryEmbed.data;

            const chunksWithScore = [];
            
            const batchSize = 20;
            for (let i = 0; i < allChunks.length; i += batchSize) {
                const batch = allChunks.slice(i, i + batchSize);
                for (const chunk of batch) {
                    if (!chunk._embed) {
                        const text = `${chunk.conteudo} ${chunk.tags?.join(' ') || ''} ${chunk.titulo || ''}`;
                        try {
                            const emb = await embedder(text, { pooling: 'mean', normalize: true });
                            chunk._embed = emb.data;
                        } catch (e) {
                            chunk._embed = null;
                        }
                    }
                    if (chunk._embed) {
                        const sim = cosineSimilarity(queryVec, chunk._embed);
                        chunksWithScore.push({ ...chunk, similarity: sim });
                    }
                }
                await new Promise(r => setTimeout(r, 0));
            }

            chunksWithScore.sort((a, b) => b.similarity - a.similarity);
            return chunksWithScore.slice(0, topK);
        }

        // ==================== SÍNTESE DE RESPOSTA ====================
        function synthesizeResponse(query, chunks) {
            const queryLower = query.toLowerCase();
            
            // Verifica se algum chunk tem alta similaridade (confiança alta)
            const highConfidence = chunks.filter(c => (c.similarity || 0) > 0.5);
            
            // Busca fallback no conhecimento geral
            const fallbackMatches = searchFallbackKnowledge(query);
            
            // Se há chunks com alta similaridade, usa eles
            if (highConfidence.length > 0) {
                return generateResponseFromChunks(query, highConfidence, 'alta');
            }
            
            // Se há chunks com média similaridade
            if (chunks.length > 0 && (chunks[0].similarity || 0) > 0.3) {
                return generateResponseFromChunks(query, chunks, 'media');
            }
            
            // Se há fallback no conhecimento geral
            if (fallbackMatches.length > 0) {
                return generateResponseFromFallback(query, fallbackMatches);
            }
            
            // Resposta genérica com os chunks disponíveis
            if (chunks.length > 0) {
                return generateResponseFromChunks(query, chunks, 'baixa');
            }
            
            return {
                answer: `❓ Não encontrei informações específicas sobre "${query}" na base de conhecimento nem no meu conhecimento geral.`,
                confidence: 'baixa',
                sources: []
            };
        }

        function generateResponseFromChunks(query, chunks, confidence) {
            let answer = '';
            const sources = [];
            
            // Extrai informações relevantes dos chunks
            const contentPieces = chunks.map(c => c.conteudo || '').filter(t => t.length > 0);
            const tags = new Set();
            chunks.forEach(c => (c.tags || []).forEach(t => tags.add(t)));
            
            // Tenta extrair a informação mais relevante
            const combinedContent = contentPieces.join(' ');
            
            // Busca por palavras-chave específicas na pergunta
            const queryTokens = query.toLowerCase().split(/\s+/).filter(w => w.length > 3);
            
            // Encontra frases que contêm as palavras-chave
            let relevantSentences = [];
            contentPieces.forEach(text => {
                const sentences = text.split(/[.!?]+/);
                sentences.forEach(sent => {
                    const sentLower = sent.toLowerCase();
                    const matchCount = queryTokens.filter(t => sentLower.includes(t)).length;
                    if (matchCount > 0) {
                        relevantSentences.push({ text: sent.trim(), score: matchCount / queryTokens.length });
                    }
                });
            });
            
            relevantSentences.sort((a, b) => b.score - a.score);
            
            // Constrói resposta
            if (relevantSentences.length > 0) {
                const topSentences = relevantSentences.slice(0, 3).map(s => s.text);
                answer = topSentences.join('. ') + '.';
            } else {
                // Pega os primeiros 200 caracteres de cada chunk
                const previews = contentPieces.map(t => t.substring(0, 300));
                answer = previews.join(' ... ');
            }
            
            // Adiciona informações das fontes
            chunks.forEach(c => {
                if (c.fonte && !sources.includes(c.fonte)) {
                    sources.push(c.fonte);
                }
            });
            
            const confidenceText = {
                'alta': '✅ Confiança alta - informações diretamente da base',
                'media': '⚠️ Confiança média - informações relacionadas encontradas',
                'baixa': 'ℹ️ Confiança baixa - informações parcialmente relacionadas'
            };
            
            return {
                answer: answer,
                confidence: confidence,
                confidenceText: confidenceText[confidence] || confidenceText['baixa'],
                sources: sources,
                tags: Array.from(tags).slice(0, 5)
            };
        }

        function generateResponseFromFallback(query, matches) {
            const bestMatch = matches[0];
            return {
                answer: `🧠 **Conhecimento geral sobre "${bestMatch.topic}":**\n\n${bestMatch.content}`,
                confidence: 'media',
                confidenceText: 'ℹ️ Resposta baseada em conhecimento geral (não está na base JSON)',
                sources: ['Conhecimento geral do sistema'],
                tags: ['cromatografia geral', 'conceitos']
            };
        }

        // ==================== UI ====================
        function addMessage(sender, content) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.innerHTML = content.replace(/\n/g, '<br>');
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'typing';
            div.id = 'typingIndicator';
            div.innerHTML = '🧠 processando com RAG inteligente...';
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeTyping() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        async function handleUserQuery() {
            if (sendBtn.disabled) return;
            const query = userInput.value.trim();
            if (!query) return;

            sendBtn.disabled = true;
            userInput.disabled = true;
            addMessage('user', `<strong>${query}</strong>`);
            userInput.value = '';
            showTyping();

            try {
                const chunks = await retrieveChunks(query, 5);
                removeTyping();

                // Sintetiza resposta
                const result = synthesizeResponse(query, chunks);
                
                let response = `🔍 <strong>Pergunta:</strong> ${query}<br><br>`;
                response += `<div style="background:#f8faff;padding:12px 16px;border-radius:12px;border-left:4px solid #2f6bb0;">`;
                response += `<strong>📖 Resposta:</strong><br><br>${result.answer}`;
                response += `<br><br><span class="${result.confidence === 'alta' ? 'confidence-high' : 'confidence-low'}">${result.confidenceText}</span>`;
                response += `</div>`;
                
                if (result.sources && result.sources.length > 0) {
                    response += `<div class="sources">📄 <strong>Fontes:</strong> ${result.sources.join(', ')}</div>`;
                }
                
                if (result.tags && result.tags.length > 0) {
                    response += `<div style="margin-top:8px;font-size:0.8rem;color:#6b7f9c;">🏷️ Tags: ${result.tags.join(', ')}</div>`;
                }
                
                response += `<div class="meta">💡 Resposta sintetizada com RAG local + conhecimento geral</div>`;
                addMessage('bot', response);

            } catch (err) {
                removeTyping();
                console.error(err);
                addMessage('bot', `❌ Erro: ${err.message || 'tente novamente'}`);
            } finally {
                sendBtn.disabled = false;
                userInput.disabled = false;
                userInput.focus();
            }
        }

        // ==================== EVENTOS ====================
        sendBtn.addEventListener('click', handleUserQuery);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleUserQuery();
            }
        });

        userInput.addEventListener('input', () => {
            userInput.style.height = 'auto';
            userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
        });

        // ==================== INICIALIZAÇÃO ====================
        async function init() {
            await initEmbedder();
            await loadKnowledgeBase();
        }

        init();
    </script>
</body>
</html>
